micronaut.application.name=vrummAutomoveis
micronaut.server.port=${PORT:8080}
micronaut.views.thymeleaf.enabled=true

datasources.default.url=${DATASOURCES_DEFAULT_URL:jdbc:postgresql://localhost:5432/vrumm_automoveis}
datasources.default.username=${DATASOURCES_DEFAULT_USERNAME:admin}
datasources.default.password=${DATASOURCES_DEFAULT_PASSWORD:admin}
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.dialect=POSTGRES

flyway.datasources.default.enabled=true
flyway.datasources.default.locations=classpath:db/migration

micronaut.router.static-resources.default.enabled=true
micronaut.router.static-resources.default.paths=classpath:static
micronaut.router.static-resources.default.mapping=/**

micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**

micronaut.router.static-resources.swagger-ui.paths=classpath:META-INF/swagger/views/swagger-ui
micronaut.router.static-resources.swagger-ui.mapping=/swagger-ui/**
