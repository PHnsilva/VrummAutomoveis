<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title>Cliente</title>
</head>
<body>
<div th:fragment="content" class="crud-wrapper">
    <section class="card form-card">
        <div class="card-header-row">
            <div>
                <span class="eyebrow">CRUD</span>
                <h1 th:text="${modoEdicao} ? 'Editar cliente' : 'Novo cliente'">Cliente</h1>
            </div>
            <a class="button-secondary" th:href="@{/clientes}">Voltar</a>
        </div>

        <div class="alert alert-success" th:if="${sucesso != null}" th:text="${sucesso}">Operação concluída com sucesso.</div>
        <div class="alert alert-error" th:if="${erro != null}" th:text="${erro}">Não foi possível salvar o cliente.</div>

        <form class="cliente-form" th:action="${modoEdicao} ? @{/clientes/{id}/editar(id=${clienteId})} : @{/clientes}" method="post">
            <div class="form-grid page-form-grid">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" th:value="${form.nome}" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" name="email" th:value="${form.email}" required>
                </div>
                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" name="cpf" th:value="${form.cpf}" required>
                </div>
                <div class="form-group">
                    <label>RG</label>
                    <input type="text" name="rg" th:value="${form.rg}" required>
                </div>
                <div class="form-group form-group-full">
                    <label>Profissão</label>
                    <input type="text" name="profissao" th:value="${form.profissao}" required>
                </div>

                <div class="form-section-title form-group-full">Endereço</div>
                <div class="form-group">
                    <label>CEP</label>
                    <input type="text" name="enderecoCep" th:value="${form.enderecoCep}" required>
                </div>
                <div class="form-group">
                    <label>UF</label>
                    <input type="text" name="enderecoUf" maxlength="2" th:value="${form.enderecoUf}" required>
                </div>
                <div class="form-group form-group-full">
                    <label>Logradouro</label>
                    <input type="text" name="enderecoLogradouro" th:value="${form.enderecoLogradouro}" required>
                </div>
                <div class="form-group">
                    <label>Número</label>
                    <input type="text" name="enderecoNumero" th:value="${form.enderecoNumero}" required>
                </div>
                <div class="form-group">
                    <label>Complemento</label>
                    <input type="text" name="enderecoComplemento" th:value="${form.enderecoComplemento}">
                </div>
                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" name="enderecoBairro" th:value="${form.enderecoBairro}" required>
                </div>
                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" name="enderecoCidade" th:value="${form.enderecoCidade}" required>
                </div>

                <div class="form-section-title form-group-full">Rendimentos (máximo 3)</div>
                <div class="form-group">
                    <label>Empregadora 1</label>
                    <input type="text" name="entidadeEmpregadora1" th:value="${form.entidadeEmpregadora1}">
                </div>
                <div class="form-group">
                    <label>Rendimento mensal 1</label>
                    <input type="number" name="valorRendimento1" step="0.01" min="0" th:value="${form.valorRendimento1}">
                </div>
                <div class="form-group">
                    <label>Empregadora 2</label>
                    <input type="text" name="entidadeEmpregadora2" th:value="${form.entidadeEmpregadora2}">
                </div>
                <div class="form-group">
                    <label>Rendimento mensal 2</label>
                    <input type="number" name="valorRendimento2" step="0.01" min="0" th:value="${form.valorRendimento2}">
                </div>
                <div class="form-group">
                    <label>Empregadora 3</label>
                    <input type="text" name="entidadeEmpregadora3" th:value="${form.entidadeEmpregadora3}">
                </div>
                <div class="form-group">
                    <label>Rendimento mensal 3</label>
                    <input type="number" name="valorRendimento3" step="0.01" min="0" th:value="${form.valorRendimento3}">
                </div>

                <div class="form-group form-group-full">
                    <label th:text="${modoEdicao} ? 'Nova senha (opcional)' : 'Senha'">Senha</label>
                    <input type="password" name="senha" th:required="${!modoEdicao}">
                </div>
            </div>
            <button class="button-primary" type="submit" th:text="${modoEdicao} ? 'Salvar alterações' : 'Criar cliente'">Salvar</button>
        </form>
    </section>
</div>
</body>
</html>
