<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title>Cliente</title>
</head>
<body>
<div th:fragment="content" class="crud-wrapper">
    <section class="card form-card">
        <div class="card-header-row">
            <div>
                <span class="eyebrow">CRUD</span>
                <h1 th:text="${edicao} ? 'Editar cliente' : 'Novo cliente'">Cliente</h1>
            </div>
            <a class="button-secondary" th:href="@{/clientes}">Voltar</a>
        </div>

        <div class="alert alert-success" th:if="${sucesso != null}" th:text="${sucesso}">Operação concluída com sucesso.</div>
        <div class="alert alert-error" th:if="${erro != null}" th:text="${erro}">Não foi possível salvar o cliente.</div>

        <form class="cliente-form" th:action="${edicao} ? @{/clientes/{id}(id=${clienteEdicaoId})} : @{/clientes}" method="post">
            <div class="form-grid page-form-grid">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" th:value="${form.nome}" maxlength="150" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" name="email" th:value="${form.email}" maxlength="150" required>
                </div>
                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" name="cpf" th:value="${form.cpf}" inputmode="numeric" pattern="\d{11}" minlength="11" maxlength="11" title="Informe 11 dígitos numéricos" required>
                    <p class="form-helper">Use apenas números (11 dígitos).</p>
                </div>
                <div class="form-group">
                    <label>RG</label>
                    <input type="text" name="rg" th:value="${form.rg}" maxlength="20" required>
                </div>
                <div class="form-group form-group-full">
                    <label>Profissão</label>
                    <input type="text" name="profissao" th:value="${form.profissao}" maxlength="100" required>
                </div>

                <div class="form-section-title form-group-full">Endereço</div>
                <div class="form-group form-group-full">
                    <label>Endereço</label>
                    <input type="text" name="endereco" th:value="${form.endereco}" maxlength="150" required>
                </div>

                <div class="form-section-title form-group-full">Rendimentos (máximo 3)</div>
                <div class="form-group">
                    <label>Empregadora 1</label>
                    <input type="text" name="entidadeEmpregadora1" th:value="${form.entidadeEmpregadora1}" maxlength="120">
                </div>
                <div class="form-group">
                    <label>Rendimento mensal 1</label>
                    <input type="number" name="valorRendimento1" step="0.01" min="0" inputmode="decimal" th:value="${form.valorRendimento1}">
                    <p class="form-helper">Use valor positivo com até 2 casas decimais.</p>
                </div>
                <div class="form-group">
                    <label>Empregadora 2</label>
                    <input type="text" name="entidadeEmpregadora2" th:value="${form.entidadeEmpregadora2}" maxlength="120">
                </div>
                <div class="form-group">
                    <label>Rendimento mensal 2</label>
                    <input type="number" name="valorRendimento2" step="0.01" min="0" inputmode="decimal" th:value="${form.valorRendimento2}">
                    <p class="form-helper">Use valor positivo com até 2 casas decimais.</p>
                </div>
                <div class="form-group">
                    <label>Empregadora 3</label>
                    <input type="text" name="entidadeEmpregadora3" th:value="${form.entidadeEmpregadora3}" maxlength="120">
                </div>
                <div class="form-group">
                    <label>Rendimento mensal 3</label>
                    <input type="number" name="valorRendimento3" step="0.01" min="0" inputmode="decimal" th:value="${form.valorRendimento3}">
                    <p class="form-helper">Use valor positivo com até 2 casas decimais.</p>
                </div>

                <div class="form-group form-group-full">
                    <label th:text="${edicao} ? 'Nova senha (opcional)' : 'Senha'">Senha</label>
                    <input type="password" name="senha" th:required="${!edicao}">
                </div>
            </div>
            <button class="button-primary" type="submit" th:text="${edicao} ? 'Salvar alterações' : 'Criar cliente'">Salvar</button>
        </form>
    </section>
</div>
</body>
</html>
