<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Cliente</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container">
        <section class="page-header">
            <div>
                <h1 th:text="${modoEdicao} ? 'Editar Cliente' : 'Novo Cliente'">Cliente</h1>
                <p>Preencha os dados básicos do cliente.</p>
            </div>
        </section>

        <section class="card form-card">
            <div th:if="${erro != null}" class="alert alert-error" th:text="${erro}"></div>

            <form method="post"
                  th:action="${modoEdicao} ? @{/clientes/{id}/editar(id=${clienteId})} : @{/clientes}"
                  class="form-grid">

                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" th:value="${cliente.nome}" required>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input id="cpf" name="cpf" type="text" th:value="${cliente.cpf}" required>
                </div>

                <div class="form-group">
                    <label for="rg">RG</label>
                    <input id="rg" name="rg" type="text" th:value="${cliente.rg}" required>
                </div>

                <div class="form-group">
                    <label for="profissao">Profissão</label>
                    <input id="profissao" name="profissao" type="text" th:value="${cliente.profissao}" required>
                </div>

                <div class="form-actions">
                    <a class="btn btn-secondary" href="/clientes">Cancelar</a>
                    <button class="btn btn-primary" type="submit">Salvar</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
