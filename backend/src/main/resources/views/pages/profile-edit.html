<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title>Editar meu perfil</title>
</head>
<body>
<div th:fragment="content" class="crud-wrapper">
    <section class="card form-card">
        <div class="card-header-row">
            <div>
                <span class="eyebrow">Minha conta</span>
                <h1>Editar meu perfil</h1>
                <p>Atualize os dados básicos da sua própria conta sem depender do CRUD administrativo.</p>
            </div>
            <a class="button-secondary" th:href="@{/perfil}">Voltar</a>
        </div>

        <div class="alert alert-success" th:if="${sucesso != null}" th:text="${sucesso}">Perfil atualizado com sucesso.</div>
        <div class="alert alert-error" th:if="${erro != null}" th:text="${erro}">Não foi possível salvar o perfil.</div>

        <form class="cliente-form" th:action="@{/perfil/editar}" method="post">
            <div class="form-grid page-form-grid">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" th:value="${form.nome}" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" name="email" th:value="${form.email}" required>
                </div>
                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" name="cpf" th:value="${form.cpf}" required>
                </div>
                <div class="form-group">
                    <label>RG</label>
                    <input type="text" name="rg" th:value="${form.rg}" required>
                </div>
                <div class="form-group form-group-full">
                    <label>Profissão</label>
                    <input type="text" name="profissao" th:value="${form.profissao}" required>
                </div>
                <div class="form-group form-group-full">
                    <label>Nova senha (opcional)</label>
                    <input type="password" name="senha">
                </div>
            </div>
            <button class="button-primary" type="submit">Salvar meu perfil</button>
        </form>
    </section>
</div>
</body>
</html>
