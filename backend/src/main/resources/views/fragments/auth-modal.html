<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="authModal">

  <div class="modal-overlay" id="loginOverlay" onclick="handleOverlay(event)">
    <div class="modal">

      <!-- LOGIN -->
      <div id="panel-login">
        <h2 class="modal-title">Login</h2>
        <form th:action="@{/login}" method="post">
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="senha" placeholder="••••••••" required>
          </div>
          <button type="submit" class="submit-btn">Login</button>
        </form>

        <p class="modal-switch">Don't have an account? <a onclick="switchPanel('cadastro')">Register</a></p>
      </div>

      <!-- CADASTRO -->
      <div id="panel-cadastro" style="display:none;">
        <h2 class="modal-title">Register</h2>

        <form th:action="@{/cadastro}" method="post">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="nome" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="senha" placeholder="••••••••" required>
          </div>
          <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <p class="modal-switch">Already have an account? <a onclick="switchPanel('login')">Login</a></p>
      </div>

    </div>
  </div>

</th:block>

</body>
</html>
